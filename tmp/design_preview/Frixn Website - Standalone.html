  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

font-size:9px;letter-spacing:.24em;color:#4d463f;\">NFC · N°0001<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:38px;letter-spacing:-.03em;color:#F4F0EA;\">frixn<span style=\"color:#FF4D00;\">.<\u002Fspan><\u002Fdiv>\n        <div style=\"position:absolute;bottom:23px;left:27px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.24em;color:#4d463f;\">TAP TO CONNECT<\u002Fdiv>\n        <div style=\"position:absolute;bottom:23px;right:27px;display:flex;gap:4px;align-items:center;\">\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid #4d463f;\"><\u002Fspan>\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid #FF4D00;margin-left:-7px;\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h2 style=\"margin:0;max-width:860px;font-size:clamp(34px,4.6vw,64px);font-weight:600;letter-spacing:-.04em;line-height:1.14;\">\n      <span data-v5r=\"\" style=\"display:block;color:#F4F0EA;\">Every meeting you have tomorrow<\u002Fspan>\n      <span data-v5r=\"\" data-d=\"120\" style=\"display:block;font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:#FF8952;\">is revenue you can capture.<\u002Fspan>\n      <span data-v5r=\"\" data-d=\"620\" style=\"display:block;color:#97908A;\">Or revenue you'll lose.<\u002Fspan>\n    <\u002Fh2>\n\n    <div data-v5r=\"\" data-d=\"720\" style=\"margin-top:20px;font-size:22px;font-weight:900;color:#F4F0EA;\">Start converting meetings.<\u002Fdiv>\n\n    <div data-v5r=\"\" data-d=\"800\" style=\"display:flex;gap:14px;margin-top:38px;flex-wrap:wrap;justify-content:center;\">\n      <a href=\"#pricing\" style=\"display:inline-flex;align-items:center;height:52px;padding:0 32px;border-radius:10px;background:#FF4D00;color:#fff;font-size:15px;font-weight:600;text-decoration:none;box-shadow:0 16px 44px -16px rgba(255,77,0,.6);transition:transform .18s cubic-bezier(.21,.9,.27,1);\" style-hover=\"color:#fff;\" style-active=\"transform:scale(.97);\">{{ ctaPrice }}<\u002Fa>\n      <a href=\"#moment\" style=\"display:inline-flex;align-items:center;height:52px;padding:0 32px;border-radius:10px;border:1px solid rgba(255,77,0,.4);color:#FF8952;font-size:15px;font-weight:500;text-decoration:none;box-sizing:border-box;transition:border-color .18s;\" style-hover=\"border-color:rgba(255,77,0,.7);color:#FF8952;\">Book a 15-minute demo<\u002Fa>\n    <\u002Fdiv>\n    <div data-v5r=\"\" data-d=\"880\" style=\"margin-top:24px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:#6E6862;\"><br><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1100px;margin:110px auto 0;border-top:1px solid rgba(255,255,255,.08);padding-top:30px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;\">\n    <span style=\"font-weight:700;font-size:16px;\">frixn<span style=\"color:#FF4D00;\">.<\u002Fspan><\u002Fspan>\n    <div style=\"display:flex;gap:24px;font-size:12.5px;\">\n      <a href=\"#how\" style=\"color:#6E6862;text-decoration:none;\" style-hover=\"color:#F4F0EA;\">Product<\u002Fa>\n      <a href=\"#console\" style=\"color:#6E6862;text-decoration:none;\" style-hover=\"color:#F4F0EA;\">Command<\u002Fa>\n      <a href=\"#pricing\" style=\"color:#6E6862;text-decoration:none;\" style-hover=\"color:#F4F0EA;\">Pricing<\u002Fa>\n    <\u002Fdiv>\n    <span style=\"font-size:11px;color:#4d463f;\">&nbsp;· Built for field sales, built in India<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;seatPrice&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:499,&quot;min&quot;:99,&quot;max&quot;:1999,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Pricing&quot;,&quot;description&quot;:&quot;Per-seat monthly price (₹) — drives pricing card, ROI math, and final CTA&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    uc: 0,\n    taps: 347,\n    leads: 289,\n    feed: [\n      { name: 'Arjun T.', city: 'Bengaluru' },\n      { name: 'Sana K.', city: 'Mumbai' },\n      { name: 'Vikram P.', city: 'Pune' },\n      { name: 'Nia D.', city: 'Hyderabad' }\n    ]\n  };\n\n  componentDidMount() {\n    this.cleanup = [];\n    this.timers = [];\n    this.demoRunning = false;\n    this.demoPlayed = false;\n    this.reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.setupReveals();\n    this.setupScrollFx();\n    this.setupDashLive();\n    if (!this.reduced) {\n      this.setupHeroDots();\n      this.setupCardTilt();\n      this.setupLeakScroll();\n      this.setupDemoAutoplay();\n    }\n  }\n\n  componentWillUnmount() {\n    (this.cleanup || []).forEach(f => { try { f(); } catch (e) {} });\n    (this.timers || []).forEach(t => clearTimeout(t));\n  }\n\n  // ---- reveals: opacity + translateY + blur (Jakub enter recipe) ----\n  setupReveals() {\n    const els = [...document.querySelectorAll('[data-v5r]')];\n    if (this.reduced) return;\n    const io = new IntersectionObserver(entries => {\n      entries.forEach(en => {\n        if (!en.isIntersecting) return;\n        const t = en.target;\n        io.unobserve(t);\n        setTimeout(() => {\n          t.style.opacity = '1';\n          t.style.transform = 'translateY(0)';\n          t.style.filter = 'blur(0)';\n        }, +(t.dataset.d || 0));\n      });\n    }, { threshold: 0.15 });\n    els.forEach(t => {\n      const r = t.getBoundingClientRect();\n      if (r.top > window.innerHeight * 0.9) {\n        t.style.opacity = '0';\n        t.style.transform = 'translateY(14px)';\n        t.style.filter = 'blur(6px)';\n        t.style.transition = 'opacity .55s cubic-bezier(.21,.9,.27,1), transform .55s cubic-bezier(.21,.9,.27,1), filter .55s cubic-bezier(.21,.9,.27,1)';\n        io.observe(t);\n      }\n    });\n    this.cleanup.push(() => io.disconnect());\n  }\n\n  // ---- scroll: hairline progress + nav glass ----\n  setupScrollFx() {\n    const prog = document.getElementById('v5prog');\n    const nav = document.getElementById('v5nav');\n    let ticking = false;\n    const apply = () => {\n      ticking = false;\n      const max = document.documentElement.scrollHeight - window.innerHeight;\n      if (prog && max > 0) prog.style.transform = 'scaleX(' + (window.scrollY / max).toFixed(4) + ')';\n      if (nav) {\n        const on = window.scrollY > 40;\n        nav.style.background = on ? 'rgba(11,10,9,.78)' : 'rgba(11,10,9,0)';\n        nav.style.borderColor = on ? 'rgba(255,255,255,.07)' : 'rgba(255,255,255,0)';\n        nav.style.backdropFilter = on ? 'blur(16px)' : 'none';\n      }\n    };\n    const onScroll = () => { if (!ticking) { ticking = true; requestAnimationFrame(apply); } };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    apply();\n    this.cleanup.push(() => window.removeEventListener('scroll', onScroll));\n  }\n\n  // ---- floating data-point dots in hero (leads waiting to be captured) ----\n  setupHeroDots() {\n    const wrap = document.getElementById('v7dots');\n    if (!wrap || wrap.childElementCount) return;\n    for (let i = 0; i < 14; i++) {\n      const d = document.createElement('div');\n      const s = (2 + Math.random() * 2).toFixed(1);\n      const warm = Math.random() < 0.62;\n      d.style.cssText = 'position:absolute;border-radius:50%;pointer-events:none;' +\n        'width:' + s + 'px;height:' + s + 'px;' +\n        'left:' + (4 + Math.random() * 92).toFixed(1) + '%;' +\n        'top:' + (4 + Math.random() * 92).toFixed(1) + '%;' +\n        'background:' + (warm ? 'rgba(255,77,0,.35)' : 'rgba(232,192,125,.25)') + ';' +\n        'animation:v7pulse ' + (2 + Math.random() * 5).toFixed(2) + 's ease-in-out infinite;' +\n        'animation-delay:-' + (Math.random() * 5).toFixed(2) + 's;';\n      wrap.appendChild(d);\n    }\n  }\n\n  // ---- hero card pointer tilt (subtle, gated) ----\n  setupCardTilt() {\n    ['v5card', 'v6ctaCard'].forEach(id => {\n      const card = document.getElementById(id);\n      if (!card) return;\n      const wrap = card.parentElement;\n      const mm = e => {\n        const r = wrap.getBoundingClientRect();\n        const x = (e.clientX - r.left) / r.width - 0.5;\n        const y = (e.clientY - r.top) / r.height - 0.5;\n        card.style.transform = 'rotateX(' + (-y * 7).toFixed(2) + 'deg) rotateY(' + (x * 7).toFixed(2) + 'deg)';\n      };\n      const ml = () => { card.style.transform = 'rotateX(0) rotateY(0)'; };\n      wrap.addEventListener('mousemove', mm);\n      wrap.addEventListener('mouseleave', ml);\n      this.cleanup.push(() => { wrap.removeEventListener('mousemove', mm); wrap.removeEventListener('mouseleave', ml); });\n    });\n  }\n\n  // ---- demo autoplays once when stage scrolls into view ----\n  setupDemoAutoplay() {\n    const sec = document.getElementById('moment');\n    if (!sec) return;\n    const io = new IntersectionObserver(entries => {\n      entries.forEach(en => {\n        if (en.isIntersecting && !this.demoPlayed) {\n          io.disconnect();\n          this.timers.push(setTimeout(() => { if (!this.demoPlayed) this.runDemo(); }, 700));\n        }\n      });\n    }, { threshold: 0.45 });\n    io.observe(sec);\n    this.cleanup.push(() => io.disconnect());\n  }\n\n  // ---- the 6-second tap sequence ----\n  runDemo = () => {\n    if (this.demoRunning) return;\n    this.demoRunning = true;\n    this.demoPlayed = true;\n    const $ = id => document.getElementById(id);\n    const at = (ms, fn) => this.timers.push(setTimeout(fn, ms));\n    const rail = $('v5rail'), form = $('v5form'), wa = $('v5wa'),\n      send = $('v5send'), auto = $('v5auto'), row = $('v5row'),\n      msg = $('v5msg'), del = $('v5del'), count = $('v5count'),\n      playLabel = $('v5playLabel'), demoCard = $('v5demoCard');\n    const fields = [1, 2, 3].map(i => [$('v5f' + i), $('v5a' + i)]);\n    const dots = [1, 2, 3].map(i => $('v5s' + i + 'dot'));\n    const stations = [1, 2, 3].map(i => $('v5s' + i));\n    const tags = [0, 1, 2, 3].map(i => $('v5t' + i));\n    if (!rail) { this.demoRunning = false; return; }\n\n    // reset\n    rail.style.transform = 'scaleX(0)';\n    if (form) { form.style.opacity = '1'; form.style.filter = 'blur(0)'; }\n    if (wa) { wa.style.opacity = '0'; wa.style.filter = 'blur(4px)'; }\n    fields.forEach(([f, a]) => { if (f) f.textContent = ''; if (a) a.style.opacity = '0'; });\n    if (auto) { auto.textContent = '3 FIELDS'; auto.style.color = '#B4AA9C'; }\n    if (send) { send.style.background = '#DAD3C8'; send.style.transform = 'none'; }\n    if (row) { row.style.opacity = '0'; row.style.transform = 'translateY(8px)'; row.style.filter = 'blur(4px)'; }\n    if (msg) msg.textContent = '';\n    if (del) del.style.opacity = '0';\n    dots.forEach(d => { if (d) d.style.background = '#33302c'; });\n    stations.forEach(s => { if (s) { s.style.borderColor = 'rgba(255,255,255,.08)'; s.style.boxShadow = 'none'; } });\n    tags.forEach(t => { if (t) t.style.color = '#6E6862'; });\n    if (playLabel) playLabel.textContent = 'Playing…';\n\n    const lite = i => {\n      const s = stations[i], d = dots[i];\n      if (s) { s.style.borderColor = 'rgba(255,77,0,.45)'; s.style.boxShadow = '0 0 0 1px rgba(255,77,0,.15), 0 24px 60px -30px rgba(255,77,0,.3)'; }\n      if (d) d.style.background = '#FF4D00';\n    };\n    const dim = i => {\n      const s = stations[i];\n      if (s) { s.style.borderColor = 'rgba(255,255,255,.08)'; s.style.boxShadow = 'none'; }\n      if (dots[i]) dots[i].style.background = '#2EBD85';\n    };\n    const tag = i => { if (tags[i]) tags[i].style.color = i === 3 ? '#2EBD85' : '#FF8952'; };\n    const railTo = p => { rail.style.transform = 'scaleX(' + p + ')'; };\n\n    // 1 · TAP\n    lite(0); tag(0); railTo(0.12);\n    if (demoCard && demoCard.animate && !this.reduced) demoCard.animate(\n      [{ transform: 'translateY(0)' }, { transform: 'translateY(-6px)' }, { transform: 'translateY(0)' }],\n      { duration: 450, easing: 'cubic-bezier(.21,.9,.27,1)' });\n\n    // 2 · AUTO-FILL\n    const vals = ['Ananya Rao', '+91 98••• •4521', 'Nexlify Tech'];\n    at(800, () => { dim(0); lite(1); tag(1); railTo(0.4); if (auto) auto.textContent = 'AUTO-FILLING…'; });\n    const fill = i => {\n      const [f, a] = fields[i];\n      if (f) f.textContent = vals[i];\n      if (a) a.style.opacity = '1';\n    };\n    at(1050, () => fill(0));\n    at(1300, () => fill(1));\n    at(1550, () => { fill(2); if (auto) { auto.textContent = '90% AUTO-FILLED'; auto.style.color = '#1E9E6A'; } });\n\n    // 3 · SEND\n    at(2200, () => { tag(2); railTo(0.66); if (send) send.style.background = '#FF4D00'; });\n    at(2650, () => { if (send) send.style.transform = 'scale(.95)'; });\n    at(2800, () => { if (send) send.style.transform = 'scale(1)'; });\n    at(2950, () => {\n      if (form) { form.style.opacity = '0'; form.style.filter = 'blur(4px)'; }\n      if (wa) { wa.style.opacity = '1'; wa.style.filter = 'blur(0)'; }\n    });\n    const text = 'Hi Rahul, great meeting you at the expo — send me the details';\n    at(3300, () => {\n      let i = 0;\n      const type = () => {\n        if (!msg) return;\n        msg.textContent = text.slice(0, i);\n        i += 2;\n        if (i <= text.length + 1) this.timers.push(setTimeout(type, 22));\n        else if (del) del.style.opacity = '1';\n      };\n      type();\n    });\n\n    // 4 · CAPTURED\n    at(4500, () => { dim(1); lite(2); tag(3); railTo(1); });\n    at(4800, () => {\n      if (row) { row.style.opacity = '1'; row.style.transform = 'translateY(0)'; row.style.filter = 'blur(0)'; }\n      if (count) count.textContent = '290';\n    });\n    at(5600, () => {\n      dim(2);\n      if (playLabel) playLabel.textContent = 'Replay';\n      this.demoRunning = false;\n    });\n  };\n\n  // ---- leak scroll story ----\n  setupLeakScroll() {\n    const sec = document.getElementById('leak');\n    const num = document.getElementById('v5num');\n    const cap = document.getElementById('v5cap');\n    const foot = document.getElementById('v5leakFoot');\n    const money = document.getElementById('v5money');\n    const moneyWrap = document.getElementById('v5moneyWrap');\n    if (!sec) return;\n    const ticks = [...document.querySelectorAll('[data-v5tick]')];\n    const stages = [\n      [0, '31', 'conversations your rep had at the expo.', 31, '#F4F0EA'],\n      [0.28, '9', 'she remembers by Friday.', 9, '#F4F0EA'],\n      [0.48, '4', 'she actually followed up with.', 4, '#F4F0EA'],\n      [0.68, '1', 'deal closed.', 1, '#F4F0EA'],\n      [0.85, '27', 'walked away — and bought elsewhere.', 1, '#FF4D00']\n    ];\n    let last = -1, raf;\n    const loop = () => {\n      const r = sec.getBoundingClientRect();\n      const denom = r.height - window.innerHeight;\n      const p = denom > 0 ? Math.max(0, Math.min(1, -r.top / denom)) : 0;\n      let stage = 0;\n      stages.forEach(([atP], i) => { if (p >= atP) stage = i; });\n      if (money && moneyWrap) {\n        moneyWrap.style.opacity = p > 0.3 ? '1' : '0';\n        const pct = Math.round(Math.max(0, Math.min(1, (p - 0.28) / 0.62)) * 87);\n        money.textContent = '≈' + pct + '%';\n      }\n      if (stage !== last) {\n        last = stage;\n        const [, n, c, keep, color] = stages[stage];\n        if (num) {\n          num.style.opacity = '0'; num.style.filter = 'blur(8px)';\n          setTimeout(() => {\n            num.textContent = n; num.style.color = color;\n            num.style.opacity = '1'; num.style.filter = 'blur(0)';\n          }, 180);\n        }\n        if (cap) {\n          cap.style.opacity = '0';\n          setTimeout(() => { cap.textContent = c; cap.style.opacity = '1'; }, 180);\n        }\n        ticks.forEach((t, i) => {\n          const alive = i < keep;\n          t.style.opacity = alive ? '.9' : '.12';\n          t.style.background = alive && stage < 4 ? '#F4F0EA' : (alive ? '#FF4D00' : '#F4F0EA');\n        });\n        if (foot) foot.style.opacity = stage >= 4 ? '1' : '0';\n      }\n      raf = requestAnimationFrame(loop);\n    };\n    raf = requestAnimationFrame(loop);\n    this.cleanup.push(() => cancelAnimationFrame(raf));\n  }\n\n  // ---- live console simulation ----\n  setupDashLive() {\n    const sec = document.getElementById('console');\n    if (!sec) return;\n    const reps = [\n      ['Arjun T.', 'Bengaluru'], ['Sana K.', 'Mumbai'], ['Vikram P.', 'Pune'],\n      ['Nia D.', 'Hyderabad'], ['Rohan B.', 'Bengaluru'], ['Kabir S.', 'Delhi']\n    ];\n    let timer = null;\n    const io = new IntersectionObserver(entries => {\n      entries.forEach(en => {\n        if (en.isIntersecting && !timer) {\n          timer = setInterval(() => {\n            const [name, city] = reps[Math.floor(Math.random() * reps.length)];\n            this.setState(s => ({\n              taps: s.taps + 1,\n              leads: s.leads + (Math.random() < 0.6 ? 1 : 0),\n              feed: [{ name, city }, ...s.feed].slice(0, 4)\n            }));\n          }, 3400);\n        } else if (!en.isIntersecting && timer) { clearInterval(timer); timer = null; }\n      });\n    }, { threshold: 0.2 });\n    io.observe(sec);\n    this.cleanup.push(() => { io.disconnect(); if (timer) clearInterval(timer); });\n  }\n\n  setUc = i => {\n    if (i === this.state.uc) return;\n    const panel = document.getElementById('v5ucPanel');\n    if (panel && !this.reduced) {\n      panel.style.opacity = '0';\n      panel.style.filter = 'blur(5px)';\n      this.timers.push(setTimeout(() => {\n        this.setState({ uc: i });\n        requestAnimationFrame(() => { panel.style.opacity = '1'; panel.style.filter = 'blur(0)'; });\n      }, 220));\n    } else {\n      this.setState({ uc: i });\n    }\n  };\n\n  renderVals() {\n    const price = this.props.seatPrice ?? 499;\n    const palette = ['#FF8952', '#E8C07D', '#2EBD85', '#8FA8C8', '#C89BB4'];\n    const perf = [\n      { name: 'Arjun T.', taps: 61 }, { name: 'Sana K.', taps: 54 },\n      { name: 'Kabir S.', taps: 47 }, { name: 'Nia D.', taps: 39 },\n      { name: 'Rohan B.', taps: 31 }\n    ].map((p, i) => ({ ...p, color: palette[i], w: Math.round(p.taps / 61 * 100) + '%' }));\n    const ago = ['now', '2m', '5m', '9m'];\n    const feed = (this.state.feed || []).map((f, i) => ({\n      name: f.name, city: f.city, initial: f.name.charAt(0),\n      color: palette[(f.name.charCodeAt(0) + f.name.length) % palette.length],\n      time: ago[i] || '12m'\n    }));\n    const ucs = [\n      {\n        label: 'Founders & BD',\n        line: 'You meet 40 people at every conference.\\nYou follow up with 6.',\n        body: 'The other 34 were customers, partners, or your next hire — and they met someone else who followed up first. Every tap captures who you met and gets your deck in their inbox before you\\u2019ve moved to the next conversation.',\n        tap: 'CARD → PIPELINE',\n        stats: ['Every contact captured at the tap', 'WhatsApp thread + deck in parallel', 'Your network compounds — nothing falls through'],\n        who: 'Ananya R. — Nexlify Tech',\n        where: 'SaaSBoomi Annual · Chennai · Day 1',\n        fired: 'WhatsApp intro + pitch deck',\n        seen: 'You, and your BD pipeline'\n      },\n      {\n        label: 'VC & Investors',\n        line: 'You meet every founder who matters.\\nYou remember half by Monday.',\n        body: 'Demo days blur into one evening. Frixn captures everyone the moment you meet them — name, company, what they\\u2019re building, where. Your deal flow is only as good as your follow-up.',\n        tap: 'CAPTURED IN-ROOM',\n        stats: ['Every founder captured instantly', 'Context preserved from first tap', 'Follow-up ready before you leave'],\n        who: 'Karan V. — building in fintech infra',\n        where: 'Demo Day · Bengaluru · 7:40 PM',\n        fired: 'Calendly + fund one-pager',\n        seen: 'You + investment team'\n      },\n      {\n        label: 'SaaS Sales Teams',\n        line: 'Your AEs are at 12 events a quarter.\\nMost notes never get sent.',\n        body: 'Each rep meets 30 potential customers per event, and most conversations end with \\u201cI\\u2019ll send you a note.\\u201d Frixn captures the lead as the conversation happens, fires the proposal in parallel, and logs it for the manager instantly.',\n        tap: 'SOLD, NOT REMEMBERED',\n        stats: ['Every event conversation captured', 'Proposal email fired immediately', 'Manager sees pipeline per event'],\n        who: 'Meera J. — Head of Ops, retail chain',\n        where: 'Industry Expo · Hall 4 · Booth 212',\n        fired: 'Proposal email + WhatsApp thread',\n        seen: 'Rep + sales manager, live'\n      },\n      {\n        label: 'Real Estate',\n        line: 'They toured the flat, loved the view —\\nand forgot by dinner.',\n        body: 'A tap at the site gate sends the brochure, price sheet and agent\\u2019s line to the visitor\\u2019s phone before they reach the next project. Every walk-in is tagged to the property and the agent who showed it.',\n        tap: 'FASTER THAN RIVAL SITE',\n        stats: ['Every walk-in becomes a tracked lead', 'Brochure + pricing fired at the gate', 'Tagged to property and agent'],\n        who: 'Rajiv & Shruti M. — 3BHK enquiry',\n        where: 'Site visit · Tower B · 11:20 AM',\n        fired: 'Brochure + price sheet + agent line',\n        seen: 'Agent + project sales head'\n      },\n      {\n        label: 'Insurance & BFSI',\n        line: 'Advisors meet dozens a week.\\nThe leads live in notebooks.',\n        body: 'Branch walk-ins, community events, referrals at a wedding. Every conversation becomes a lead with a name, number and instant WhatsApp intro — logged and visible to the branch manager the moment it happens.',\n        tap: 'NOTEBOOK RETIRED',\n        stats: ['Every conversation becomes a lead', 'Instant, compliant WhatsApp intro', 'Branch manager sees it live'],\n        who: 'Suresh P. — term plan referral',\n        where: 'Community event · Jayanagar · Sunday',\n        fired: 'Advisor intro + plan brochure',\n        seen: 'Advisor + branch manager'\n      },\n      {\n        label: 'Events & Community',\n        line: 'Exhibitors ask the same question\\nevery year: was it worth it?',\n        body: 'Hand frixn to exhibitors and their teams. Every booth conversation is captured and counted, so you hand each exhibitor a lead ledger — proof of ROI per booth, per day, per event. They rebook because the numbers say so.',\n        tap: 'FOOTFALL → PIPELINE',\n        stats: ['Every booth conversation counted', 'Lead ledger per exhibitor', 'ROI proof that rebooks them'],\n        who: '212 leads — Exhibitor: CloudServe',\n        where: 'Expo floor · Day 2 · all booths',\n        fired: 'Lead ledger + ROI report',\n        seen: 'Organiser + every exhibitor'\n      }\n    ];\n    const uci = Math.min(this.state.uc || 0, ucs.length - 1);\n    const ucList = ucs.map((u, i) => ({\n      label: u.label,\n      select: () => this.setUc(i),\n      color: i === uci ? '#F4F0EA' : '#6E6862',\n      line: i === uci ? '#FF4D00' : 'rgba(0,0,0,0)'\n    }));\n    return {\n      ucList,\n      ucLine: ucs[uci].line,\n      ucBody: ucs[uci].body,\n      ucTap: ucs[uci].tap,\n      ucStats: ucs[uci].stats,\n      ucWho: ucs[uci].who,\n      ucWhere: ucs[uci].where,\n      ucFired: ucs[uci].fired,\n      ucSeen: ucs[uci].seen,\n      ticks: Array.from({ length: 31 }, (_, i) => i),\n      perf, feed,\n      liveTaps: this.state.taps,\n      liveLeads: this.state.leads,\n      runDemo: this.runDemo,\n      seatPrice: '₹' + price,\n      price10: '₹' + (price * 10).toLocaleString('en-IN'),\n      price25: '₹' + (price * 25).toLocaleString('en-IN'),\n      ctaPrice: 'Get started — ₹' + price + '/seat'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
